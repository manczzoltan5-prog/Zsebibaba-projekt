<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Zsebibaba — Zsebkerék</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(900px 500px at 50% -10%,rgba(255,0,0,.12),transparent 60%),
             radial-gradient(700px 400px at 50% 110%,rgba(255,0,0,.07),transparent 60%),
             #0a0a0c;
  color:#f4f4f5;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  padding:20px;overflow:hidden;
}

/* Phone */
.phone{
  position:relative;width:min(390px,96vw);height:min(820px,96vh);
  background:#000;border-radius:50px;padding:10px;
  box-shadow:0 0 0 2px #1c1c1e,0 40px 80px rgba(0,0,0,.8);
}
.screen{
  width:100%;height:100%;background:#0a0a0c;
  border-radius:42px;overflow:hidden;
  position:relative;display:flex;flex-direction:column;
}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:100px;height:28px;background:#000;border-radius:20px;z-index:10}
.statusbar{display:flex;justify-content:space-between;
  padding:14px 26px 0;font-size:12px;font-weight:500;color:#fff}

/* Header */
.header{padding:48px 22px 6px;text-align:center}
.eyebrow{font-size:10px;letter-spacing:3.5px;text-transform:uppercase;
  color:#ff4040;font-weight:500;margin:0 0 6px}
.title{font-family:'Playfair Display',serif;font-size:30px;font-weight:500;
  letter-spacing:-.5px;margin:0 0 4px;color:#fff}
.title .accent{color:#ff0000;font-style:italic}
.subtitle{font-size:12px;color:#6b6b72;font-weight:300;margin:0}

/* Meter (spins remaining) */
.meter{
  margin:16px auto 0;display:flex;align-items:center;gap:10px;width:fit-content;
  padding:8px 16px;background:linear-gradient(180deg,#1a1a1d,#111114);
  border:1px solid rgba(255,255,255,.06);border-radius:99px;
}
.meter-dot{width:7px;height:7px;border-radius:50%;background:#ff0000;
  box-shadow:0 0 8px rgba(255,0,0,.9),0 0 16px rgba(255,0,0,.5);
  animation:dot 1.6s ease-in-out infinite}
@keyframes dot{0%,100%{opacity:1}50%{opacity:.4}}
.meter-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:#9b9ba2;font-weight:500}
.meter-num{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;line-height:1}
.meter-num.zero{color:#5a5a60}

/* Wheel stage */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:16px 16px 16px;position:relative;gap:16px}

.wheel-wrap{
  position:relative;width:min(320px,84vw);aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 14px 40px rgba(0,0,0,.6));
}
/* outer glow */
.wheel-wrap::before{
  content:"";position:absolute;inset:-12px;border-radius:50%;
  background:conic-gradient(from 0deg,
    transparent,rgba(255,0,0,.4),transparent,rgba(255,0,0,.3),transparent);
  filter:blur(14px);opacity:.7;z-index:0;
  animation:rim 16s linear infinite;
}
@keyframes rim{to{transform:rotate(360deg)}}

/* Pointer */
.pointer{
  position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;
  border-top:22px solid #ff0000;
  filter:drop-shadow(0 0 8px rgba(255,0,0,.9)) drop-shadow(0 0 18px rgba(255,0,0,.5));
  z-index:15;
}
.pointer::after{
  content:"";position:absolute;top:-28px;left:-8px;width:16px;height:16px;
  background:#1a1a1d;border:2px solid #ff0000;border-radius:50%;
  box-shadow:0 0 8px rgba(255,0,0,.6);
}

.wheel{width:100%;height:100%;position:relative;z-index:1;
  transform:rotate(0deg);transition:transform 5.5s cubic-bezier(.17,.67,.16,1)}

/* Center hub */
.hub{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:74px;height:74px;border-radius:50%;
  background:radial-gradient(circle at 50% 35%,#2a2a2e 0%,#0d0d0f 80%);
  border:2px solid rgba(255,255,255,.1);
  box-shadow:0 6px 16px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08),0 0 30px rgba(255,0,0,.2);
  display:flex;align-items:center;justify-content:center;z-index:5;
}
.hub-mark{
  font-family:'Playfair Display',serif;font-size:26px;font-weight:700;
  background:linear-gradient(180deg,#d4a253,#8a6a3a);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  font-style:italic;
}

/* Spin button */
.spin-btn{
  position:relative;width:min(280px,76vw);padding:18px 24px;
  background:linear-gradient(180deg,#ff0000,#b30000);
  border:none;border-radius:18px;color:#fff;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;
  box-shadow:0 8px 24px rgba(255,0,0,.35),inset 0 1px 0 rgba(255,255,255,.2),
    0 0 0 1px rgba(255,255,255,.05);
  transition:transform .15s ease,box-shadow .3s ease,opacity .3s ease;
  overflow:hidden;
}
.spin-btn::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .8s ease;
}
.spin-btn:hover::before{transform:translateX(100%)}
.spin-btn:active{transform:scale(.97)}
.spin-btn:disabled{
  background:linear-gradient(180deg,#2a2a2d,#1a1a1d);
  color:#5a5a60;cursor:not-allowed;
  box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03);
}
.spin-btn .count{
  display:inline-block;margin-left:10px;padding:2px 8px;
  background:rgba(0,0,0,.3);border-radius:8px;font-size:11px;letter-spacing:1px;
}

/* Buy more */
.buy-link{
  display:block;text-align:center;
  margin-top:10px;font-size:11px;color:#7a7a82;
  text-decoration:none;letter-spacing:.5px;font-weight:300;
}
.buy-link u{color:#ff4040;text-decoration:none;border-bottom:1px solid rgba(255,64,64,.4);padding-bottom:1px}

/* Result modal */
.modal-bg{
  position:absolute;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s ease;z-index:50;
  padding:20px;
}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:320px;
  background:linear-gradient(180deg,#1a1a1d,#0e0e11);
  border:1px solid rgba(255,0,0,.3);border-radius:24px;padding:28px 24px;
  text-align:center;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 60px rgba(255,0,0,.15);
  transform:scale(.85) translateY(20px);opacity:0;
  transition:transform .4s cubic-bezier(.2,.8,.2,1),opacity .35s ease;
}
.modal-bg.show .modal{transform:scale(1) translateY(0);opacity:1}
.modal-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:#ff4040;margin-bottom:10px;font-weight:500}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;
  margin-bottom:12px;color:#fff;line-height:1.2}
.modal-prize{
  margin:14px 0 18px;padding:16px;
  background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.25);
  border-radius:14px;font-size:14px;color:#fff;font-weight:500;line-height:1.4
}
.modal-prize .emoji{font-size:32px;display:block;margin-bottom:6px}
.modal-close{
  width:100%;padding:14px;background:linear-gradient(180deg,#ff0000,#b30000);
  border:none;border-radius:14px;color:#fff;font-weight:600;font-size:13px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
}
.modal-close:active{transform:scale(.97)}
.modal-sub{font-size:10px;color:#6b6b72;margin-top:12px;letter-spacing:.5px}

/* Confetti */
.confetti{position:absolute;width:8px;height:14px;border-radius:2px;
  pointer-events:none;opacity:0;animation:confettiFall 2.4s ease-out forwards}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-20px) rotate(0)}
  100%{opacity:0;transform:translateY(400px) rotate(720deg)}
}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span>●●●●</span></div>

    <div class="header">
      <p class="eyebrow">Szerencsekerék</p>
      <h1 class="title">Zseb<span class="accent">kerék</span></h1>
      <p class="subtitle">Pörgesd meg és nyerj erotikus jutalmakat</p>

      <div class="meter">
        <div class="meter-dot"></div>
        <span class="meter-label">Pörgetéseid</span>
        <span class="meter-num" id="spinCount">3</span>
      </div>
    </div>

    <div class="stage">
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <svg class="wheel" id="wheel" viewBox="0 0 400 400"></svg>
        <div class="hub"><span class="hub-mark">Z</span></div>
      </div>

      <div style="width:100%;max-width:320px">
        <button class="spin-btn" id="spinBtn">
          Pörgess <span class="count" id="btnCount">3</span>
        </button>
        <a class="buy-link" id="buyLink">Elfogytak? <u>Vegyél új pörgetéseket</u></a>
      </div>
    </div>

    <!-- Result Modal -->
    <div class="modal-bg" id="modalBg">
      <div class="modal">
        <div class="modal-eyebrow">Nyertél</div>
        <div class="modal-title" id="modalTitle">Gratulálunk!</div>
        <div class="modal-prize">
          <span class="emoji" id="modalEmoji">🎁</span>
          <span id="modalPrize">Nyeremény</span>
        </div>
        <button class="modal-close" id="modalClose">Bezárás</button>
        <div class="modal-sub" id="modalSub">A nyereményed automatikusan jóváírva</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ────────── PRIZES (8 segments) ──────────
   colors alternate: deep-red and near-black for a premium casino feel
*/
const PRIZES = [
  { label: "Privát\nVideó",   emoji: "🎬", weight: 18, color: "#1a1a1d", text: "#fff", reward: "1 exkluzív privát videó (5 perc)" },
  { label: "10%\nKedvezmény",  emoji: "💸", weight: 22, color: "#8a0000", text: "#fff", reward: "10% kedvezmény a következő csomagra" },
  { label: "Forró\nKép",       emoji: "🔥", weight: 20, color: "#1a1a1d", text: "#fff", reward: "1 cenzúrázatlan privát kép" },
  { label: "VIP\nVideó",       emoji: "👑", weight: 8,  color: "#8a0000", text: "#fff", reward: "1 hosszú VIP videó hozzáférés (24h)" },
  { label: "Sajnos\nsemmi",    emoji: "💔", weight: 12, color: "#0d0d0f", text: "#6b6b72", reward: "Most nem sikerült — próbáld újra!" },
  { label: "Chat\n5 perc",     emoji: "💬", weight: 10, color: "#8a0000", text: "#fff", reward: "5 perc ingyen szex-chat velem" },
  { label: "Csomag\nINGYEN",   emoji: "🎁", weight: 4,  color: "#1a1a1d", text: "#fff", reward: "1 teljes csomag ingyen (12 fájl)" },
  { label: "Videó-\nhívás",    emoji: "📞", weight: 6,  color: "#8a0000", text: "#fff", reward: "10 perc ingyen szex-videóhívás" },
];

const N = PRIZES.length;
const SEG = 360 / N;
const TAU = Math.PI * 2;

/* ────────── BUILD WHEEL SVG ────────── */
const svg = document.getElementById('wheel');
const CX = 200, CY = 200, R = 195;

function polar(cx, cy, r, deg){
  const rad = (deg - 90) * Math.PI / 180;
  return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)];
}

PRIZES.forEach((p, i) => {
  const a0 = i * SEG, a1 = (i+1) * SEG;
  const [x0,y0] = polar(CX,CY,R,a0);
  const [x1,y1] = polar(CX,CY,R,a1);
  const large = SEG > 180 ? 1 : 0;

  // segment
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", `M${CX},${CY} L${x0},${y0} A${R},${R} 0 ${large} 1 ${x1},${y1} Z`);
  path.setAttribute("fill", p.color);
  path.setAttribute("stroke", "rgba(255,255,255,0.05)");
  path.setAttribute("stroke-width", "1");
  svg.appendChild(path);

  // dividing line accent (radial)
  const [lx,ly] = polar(CX,CY,R,a0);
  const div = document.createElementNS("http://www.w3.org/2000/svg","line");
  div.setAttribute("x1", CX); div.setAttribute("y1", CY);
  div.setAttribute("x2", lx); div.setAttribute("y2", ly);
  div.setAttribute("stroke", "rgba(255,0,0,0.18)");
  div.setAttribute("stroke-width", "1");
  svg.appendChild(div);

  // emoji + label group, rotated so it points outward
  const mid = a0 + SEG/2;
  const [tx, ty] = polar(CX,CY, R*0.62, mid);
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("transform", `translate(${tx},${ty}) rotate(${mid})`);

  const emo = document.createElementNS("http://www.w3.org/2000/svg","text");
  emo.setAttribute("text-anchor","middle");
  emo.setAttribute("y","-18");
  emo.setAttribute("font-size","24");
  emo.textContent = p.emoji;
  g.appendChild(emo);

  const lines = p.label.split("\n");
  lines.forEach((line, li) => {
    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("text-anchor","middle");
    t.setAttribute("y", 8 + li*13);
    t.setAttribute("fill", p.text);
    t.setAttribute("font-family","'Inter',sans-serif");
    t.setAttribute("font-size","11");
    t.setAttribute("font-weight","500");
    t.setAttribute("letter-spacing","0.3");
    t.textContent = line;
    g.appendChild(t);
  });

  svg.appendChild(g);
});

// dot decorations on rim
for(let i=0;i<N*2;i++){
  const ang = i * (360/(N*2));
  const [dx,dy] = polar(CX,CY, R-6, ang);
  const d = document.createElementNS("http://www.w3.org/2000/svg","circle");
  d.setAttribute("cx",dx); d.setAttribute("cy",dy); d.setAttribute("r","2.5");
  d.setAttribute("fill", i%2 ? "#ff0000" : "#d4a253");
  d.setAttribute("opacity","0.75");
  svg.appendChild(d);
}
// outer ring
const ring = document.createElementNS("http://www.w3.org/2000/svg","circle");
ring.setAttribute("cx",CX); ring.setAttribute("cy",CY); ring.setAttribute("r",R);
ring.setAttribute("fill","none");
ring.setAttribute("stroke","rgba(255,255,255,0.08)");
ring.setAttribute("stroke-width","2");
svg.appendChild(ring);

/* ────────── STATE & SPIN LOGIC ────────── */
const STORAGE_KEY = "zsebkerek.spins";
const SHOW_BUY_AS_DEMO = true; // clicking "buy" adds spins (demo)

let spins = parseInt(localStorage.getItem(STORAGE_KEY) ?? "3", 10);
if (isNaN(spins) || spins < 0) spins = 3;

const spinCountEl = document.getElementById('spinCount');
const btnCountEl  = document.getElementById('btnCount');
const spinBtn     = document.getElementById('spinBtn');
const buyLink     = document.getElementById('buyLink');
const modalBg     = document.getElementById('modalBg');
const modalTitle  = document.getElementById('modalTitle');
const modalEmoji  = document.getElementById('modalEmoji');
const modalPrize  = document.getElementById('modalPrize');
const modalSub    = document.getElementById('modalSub');
const modalClose  = document.getElementById('modalClose');
const wheelEl     = document.getElementById('wheel');

let rotation = 0;
let spinning = false;

function saveSpins(){ localStorage.setItem(STORAGE_KEY, String(spins)); }

function updateUI(){
  spinCountEl.textContent = spins;
  spinCountEl.classList.toggle('zero', spins === 0);
  btnCountEl.textContent = spins;
  if (spins === 0 || spinning) {
    spinBtn.disabled = true;
    spinBtn.firstChild.textContent = spins === 0 ? "Elfogytak " : "Pörgetés... ";
  } else {
    spinBtn.disabled = false;
    spinBtn.innerHTML = `Pörgess <span class="count" id="btnCount">${spins}</span>`;
  }
}

function pickPrizeIndex(){
  const total = PRIZES.reduce((s,p)=>s+p.weight, 0);
  let r = Math.random() * total;
  for (let i=0; i<PRIZES.length; i++){
    r -= PRIZES[i].weight;
    if (r <= 0) return i;
  }
  return PRIZES.length - 1;
}

function spin(){
  if (spinning || spins <= 0) return;
  spinning = true;
  spins -= 1;
  saveSpins();
  updateUI();

  const idx = pickPrizeIndex();
  // We want segment idx to land under the top pointer (0° in our coord).
  // The center of segment i is at angle (i + 0.5) * SEG.
  // Wheel rotates by `rotation` deg (CSS clockwise).
  // After rotation, segment center sits at (segCenter + rotation) mod 360.
  // We want this to equal 0 (top), with some random jitter within the segment.
  const segCenter = (idx + 0.5) * SEG;
  const jitter = (Math.random() * 0.6 - 0.3) * SEG; // ±30% of segment width
  const targetMod = (360 - segCenter + jitter + 360) % 360;

  const fullSpins = 5 + Math.floor(Math.random() * 3); // 5–7 turns
  const currentMod = ((rotation % 360) + 360) % 360;
  const delta = ((targetMod - currentMod) + 360) % 360;
  rotation += fullSpins * 360 + delta;

  // Add a slight randomized duration for variety
  const dur = 5.2 + Math.random() * 1.2;
  wheelEl.style.transition = `transform ${dur}s cubic-bezier(.17,.67,.16,1)`;
  wheelEl.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    spinning = false;
    showPrize(idx);
    updateUI();
  }, dur * 1000 + 100);
}

function showPrize(idx){
  const p = PRIZES[idx];
  const isLoss = p.label.toLowerCase().includes('semmi');
  modalTitle.textContent = isLoss ? "Sajnos most nem..." : "Gratulálunk!";
  modalEmoji.textContent = p.emoji;
  modalPrize.querySelector ? null : null;
  // re-set the inner content properly
  document.getElementById('modalPrize').textContent = p.reward;
  modalSub.textContent = isLoss
    ? "Próbáld újra a következő pörgetéssel"
    : "A nyereményed automatikusan jóváírva";
  modalBg.classList.add('show');
  if (!isLoss) burstConfetti();
}

function burstConfetti(){
  const colors = ["#ff0000","#d4a253","#ffffff","#ff6464"];
  const phone = document.querySelector('.screen');
  for (let i=0; i<28; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (45 + Math.random()*10) + '%';
    c.style.top  = '30%';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = (Math.random()*0.4) + 's';
    c.style.transform = `translateX(${(Math.random()-0.5)*200}px) rotate(${Math.random()*360}deg)`;
    phone.appendChild(c);
    setTimeout(()=>c.remove(), 2800);
  }
}

spinBtn.addEventListener('click', spin);
modalClose.addEventListener('click', () => modalBg.classList.remove('show'));
modalBg.addEventListener('click', (e) => { if (e.target === modalBg) modalBg.classList.remove('show'); });

buyLink.addEventListener('click', (e) => {
  e.preventDefault();
  if (!SHOW_BUY_AS_DEMO) return;
  // demo: add 3 spins
  spins += 3;
  saveSpins();
  updateUI();
  // little flash on the meter
  const meter = document.querySelector('.meter');
  meter.animate(
    [{boxShadow:'0 0 0 rgba(255,0,0,0)'},{boxShadow:'0 0 30px rgba(255,0,0,0.6)'},{boxShadow:'0 0 0 rgba(255,0,0,0)'}],
    {duration:800, easing:'ease-out'}
  );
});

updateUI();
</script>
</body>
</html>
